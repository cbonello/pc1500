name: device
version: 0.1.0
description: Sharp PC-1500 pocket-computer emulator.
homepage: https://github.com/cbonello/
repository: https://github.com/cbonello/pc1500/tree/master/packages/device
issue_tracker: https://github.com/cbonello/pc1500/issues
publish_to: none

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  annotations:
    path: ../annotations
  chip_select_decoder:
    path: ../chip_select_decoder
  lcd:
    path: ../lcd
  lh5811:
    path: ../lh5811
  lh5801:
    git:
      url: https://github.com/cbonello/lh5801.git
  meta: any
  roms:
    path: ../roms
  dap: ^1.4.0

dev_dependencies:
  lint: ^2.8.0
  test: ^1.30.0
